<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>غير متصل</title>
    <style>
      body { font-family: Tahoma, Arial, sans-serif; margin: 0; background: #f8fafc; color: #0f172a; display: grid; place-items: center; min-height: 100vh; }
      .card { max-width: 420px; padding: 24px; border-radius: 18px; background: white; box-shadow: 0 20px 40px rgba(0,0,0,.08); text-align: center; }
      h1 { font-size: 1.4rem; margin-bottom: .6rem; }
      p { line-height: 1.6; color: #475569; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>أنت غير متصل الآن</h1>
      <p>يمكنك متابعة استخدام التطبيق بشكل جزئي، وسيتم استعادة المحتوى عند عودة الاتصال.</p>
    </div>
  </body>
</html>
